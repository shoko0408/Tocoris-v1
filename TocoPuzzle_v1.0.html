<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TocoPuzzle v1.0</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f0e8ff;--panel:#ffffff;--border:#c4a0e8;
  --accent:#7030c0;--gold:#9a5800;--dim:#8860aa;--text:#2a1040;
  --red:#c02828;--green:#1a8860;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'Helvetica Neue',Arial,sans-serif;user-select:none;
  -webkit-user-select:none;-webkit-tap-highlight-color:transparent;}
body{display:flex;align-items:center;justify-content:center;}

/* ── SCREENS ── */
.screen{display:none;flex-direction:column;align-items:center;
  width:100%;height:100%;padding:0;overflow-y:auto;}
.screen.on{display:flex;}

/* ── BUTTONS ── */
.btn{display:block;width:100%;padding:14px;font-size:1rem;
  letter-spacing:1px;border-radius:10px;border:none;cursor:pointer;
  font-family:inherit;transition:opacity .15s;}
.btn:active{opacity:.75;}
.btn-primary{background:var(--accent);color:#ffffff;font-weight:700;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--dim);}
.btn-danger{background:transparent;border:1px solid var(--red);color:var(--red);}
.btn-gold{background:var(--gold);color:#ffffff;font-weight:700;}
.btn-sm{padding:9px 18px;width:auto;font-size:.85rem;}

/* ── HOME ── */
#home{gap:0;justify-content:center;padding:28px 24px;}
.home-logo{font-size:2.4rem;font-weight:900;letter-spacing:2px;
  color:var(--accent);text-shadow:0 2px 10px rgba(112,48,192,.25);margin-bottom:4px;}
.home-sub{font-size:.75rem;color:var(--dim);letter-spacing:2px;margin-bottom:40px;}
.home-actions{width:100%;max-width:320px;display:flex;flex-direction:column;gap:14px;}

/* ── PUZZLE LIST ── */
#puzzle-list{padding:16px;}
.screen-title{font-size:1rem;letter-spacing:2px;color:var(--accent);
  text-align:center;padding:16px 0 12px;flex-shrink:0;}
.plist-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  width:100%;padding-bottom:80px;}
.plist-item{position:relative;border-radius:10px;overflow:hidden;
  background:var(--panel);border:2px solid var(--border);cursor:pointer;
  aspect-ratio:1;}
.plist-item.selected{border-color:var(--accent);}
.plist-item img{width:100%;height:100%;object-fit:cover;display:block;}
.plist-item .del-btn{position:absolute;top:4px;right:4px;width:22px;height:22px;
  background:rgba(255,107,107,.85);border:none;border-radius:50%;color:#fff;
  font-size:13px;line-height:22px;text-align:center;cursor:pointer;}
.plist-empty{text-align:center;color:var(--dim);font-size:.85rem;
  padding:40px 20px;grid-column:1/-1;}
.plist-bottom{position:fixed;bottom:0;left:0;right:0;padding:14px 20px;
  background:linear-gradient(transparent,var(--bg) 40%);display:flex;gap:10px;}

/* ── DIFFICULTY ── */
#difficulty{padding:20px 24px;gap:14px;justify-content:flex-start;}
#diff-preview{width:100%;max-width:280px;border-radius:12px;overflow:hidden;
  border:1px solid var(--border);flex-shrink:0;}
#diff-preview img{width:100%;display:block;}
.diff-cards{width:100%;max-width:360px;display:flex;flex-direction:column;gap:10px;}
.diff-card{background:var(--panel);border:2px solid var(--border);
  border-radius:12px;padding:14px 18px;cursor:pointer;display:flex;
  align-items:center;justify-content:space-between;transition:border-color .15s;}
.diff-card:active,.diff-card.sel{border-color:var(--accent);}
.diff-card .dc-label{font-size:1.05rem;font-weight:700;}
.diff-card .dc-info{font-size:.78rem;color:var(--dim);}
.diff-card .dc-pieces{font-size:1.4rem;font-weight:900;color:var(--accent);}

/* ── GAME ── */
#game{padding:0;position:relative;}
#game-bar{position:fixed;top:0;left:0;right:0;height:48px;
  background:rgba(240,232,255,.96);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;z-index:10;flex-shrink:0;}
.gb-timer{font-size:1.3rem;font-weight:700;color:var(--accent);
  font-variant-numeric:tabular-nums;}
.gb-pcs{font-size:.8rem;color:var(--dim);}
#game-cvs{display:block;touch-action:none;}
#hint-btn{position:fixed;bottom:14px;right:14px;width:50px;height:50px;
  border-radius:50%;background:rgba(112,48,192,.12);border:1px solid var(--accent);
  color:var(--accent);font-size:1.2rem;display:flex;align-items:center;
  justify-content:center;cursor:pointer;z-index:10;}

/* ── COMPLETE ── */
#complete{padding:24px 20px;gap:14px;justify-content:flex-start;}
.complete-title{font-size:1.5rem;font-weight:900;color:var(--green);
  letter-spacing:2px;text-align:center;padding-top:8px;}
.complete-time{font-size:2.8rem;font-weight:900;color:var(--gold);
  text-align:center;font-variant-numeric:tabular-nums;}
.complete-time small{font-size:1rem;color:var(--dim);margin-left:4px;}
.records-box{width:100%;max-width:360px;background:var(--panel);
  border:1px solid var(--border);border-radius:12px;padding:14px 16px;}
.records-title{font-size:.65rem;letter-spacing:2px;color:var(--dim);margin-bottom:8px;}
.record-row{display:flex;align-items:center;padding:5px 0;
  font-size:.85rem;border-bottom:1px solid rgba(80,30,140,.1);}
.record-row:last-child{border-bottom:none;}
.rec-rank{width:24px;color:var(--dim);}
.rec-rank.g1{color:var(--gold);}
.rec-rank.g2{color:#707070;}
.rec-rank.g3{color:#9a5800;}
.rec-name{flex:1;padding:0 8px;color:var(--text);}
.rec-time{color:var(--accent);font-weight:700;font-variant-numeric:tabular-nums;}
.record-row.new-rec .rec-name,.record-row.new-rec .rec-time{color:var(--gold);}
.rec-empty{text-align:center;color:var(--dim);font-size:.75rem;padding:8px 0;}
.complete-actions{width:100%;max-width:360px;display:flex;gap:10px;}

/* ── ROTATION TOGGLE ── */
.rot-wrap{width:100%;max-width:360px;background:var(--panel);
  border:2px solid var(--border);border-radius:12px;
  padding:14px 18px;display:flex;align-items:center;justify-content:space-between;}
.rot-label{font-size:.95rem;font-weight:700;color:var(--text);}
.rot-btns{display:flex;gap:6px;}
.rot-btn{padding:7px 18px;border:1px solid var(--border);border-radius:20px;
  background:transparent;color:var(--dim);font-family:inherit;font-size:.82rem;
  cursor:pointer;transition:all .15s;}
.rot-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.rot-hint{font-size:.7rem;color:var(--dim);text-align:center;
  width:100%;max-width:360px;padding:2px 4px;}

/* ── NAME MODAL ── */
#name-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:200;align-items:center;justify-content:center;padding:20px;}
#name-modal.on{display:flex;}
.nm-box{background:var(--panel);border:1px solid var(--border);border-radius:14px;
  padding:24px 22px;width:100%;max-width:320px;text-align:center;display:flex;
  flex-direction:column;gap:12px;}
.nm-title{color:var(--gold);font-size:1rem;font-weight:700;}
.nm-time{font-size:.85rem;color:var(--dim);}
#nm-input{background:#f8f0ff;border:1px solid var(--accent);color:var(--text);
  font-family:inherit;font-size:1rem;padding:8px 12px;border-radius:6px;
  text-align:center;outline:none;width:100%;}
#nm-input:focus{border-color:var(--gold);}
.nm-btns{display:flex;gap:8px;}
.back-btn-top{position:fixed;top:10px;left:10px;z-index:9999;background:rgba(0,0,0,0.55);color:#fff;font-size:12px;font-weight:bold;padding:7px 14px;border-radius:20px;text-decoration:none;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,0.2);letter-spacing:0.5px;transition:background 0.15s;}
.back-btn-top:hover,.back-btn-top:active{background:rgba(0,0,0,0.78);}
</style>
</head>

<a href="index.html" class="back-btn-top">← ゲームランド</a>

<!-- ══════════════ HOME ══════════════ -->
<div id="home" class="screen on">
  <div class="home-logo">TocoPuzzle</div>
  <div class="home-sub">v1.0</div>
  <div class="home-actions">
    <button class="btn btn-primary" id="btn-new">📷 新しいパズルを作る</button>
    <button class="btn btn-ghost"   id="btn-saved">🧩 保存したパズルで遊ぶ</button>
  </div>
  <!-- hidden file input -->
  <input type="file" id="file-input" accept="image/*" style="display:none">
</div>

<!-- ══════════════ PUZZLE LIST ══════════════ -->
<div id="puzzle-list" class="screen">
  <div class="screen-title">パズルを選ぶ</div>
  <div class="plist-grid" id="plist-grid"></div>
  <div class="plist-bottom">
    <button class="btn btn-ghost btn-sm" id="btn-plist-back">← 戻る</button>

<!-- ══════════════ DIFFICULTY ══════════════ -->
<div id="difficulty" class="screen">
  <div class="screen-title">難易度を選ぶ</div>
  <div id="diff-preview"><img id="diff-img" src="" alt=""></div>
  <div class="diff-cards">
    <div class="diff-card" data-diff="easy">
      <div><div class="dc-label">かんたん</div><div class="dc-info">8 × 8</div></div>

    </div>
    <div class="diff-card" data-diff="hard">
      <div><div class="dc-label">むずかしい</div><div class="dc-info">12 × 12</div></div>

<!-- ══════════════ GAME ══════════════ -->
<div id="game" class="screen">
  <div id="game-bar">

<!-- ══════════════ COMPLETE ══════════════ -->
<div id="complete" class="screen">

  <div class="complete-time" id="comp-time">0:00</div>
  <div class="records-box">
    <div class="records-title" id="rec-diff-label">BEST 3 — かんたん</div>
    <div id="records-list"></div>
  </div>
  <div class="complete-actions">
    <button class="btn btn-ghost" id="btn-comp-home">ホームへ</button>
    <button class="btn btn-primary" id="btn-comp-replay">もう一度</button>

</div>

<!-- ══════════════ NAME MODAL ══════════════ -->
<div id="name-modal">
  <div class="nm-box">
    <div class="nm-title">🏆 ベストタイム更新！</div>
    <div class="nm-time" id="nm-time-disp"></div>
    <input id="nm-input" type="text" maxlength="10" placeholder="なまえ" autocomplete="off" enterkeyhint="done">
    <div class="nm-btns">
      <button class="btn btn-ghost btn-sm" id="btn-nm-skip" style="flex:1">スキップ</button>
      <button class="btn btn-gold btn-sm" id="btn-nm-save" style="flex:2">登録する</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ══ CONSTANTS ══
const DIFF = {
  easy:   { cols:8,  rows:8,  label:'かんたん' },
  normal: { cols:10, rows:10, label:'ふつう'   },
  hard:   { cols:12, rows:12, label:'むずかしい' },
};
const SK_PUZZLES  = 'tp_puz';
const SK_REC      = 'tp_rec_'; // + puzzleId + '_' + diff
const MAX_REC     = 3;
const MAX_IMG_DIM = 900;
const MAX_THUMB   = 200;
const BAR_H       = 48;

// ══ STATE ══
let currentPuzzleId = null;
let currentDiff     = null;
let rotationMode    = false; // ピース回転あり/なし
let selectedListId  = null;
let puzzleImg       = null;
let pieces          = [];
let hEdges = [], vEdges = [];
let cols = 3, rows = 3, pw = 0, ph = 0;
let boardX = 0, boardY = 0, boardW = 0, boardH = 0;
let dragging = null, dragOX = 0, dragOY = 0, maxZ = 0;
let startTime = 0, timerIv = null, elapsedMs = 0;
let hintVisible = false;
// タッチ判定用
let touchSX = 0, touchSY = 0, touchST = 0, touchMoved = false;

// ══ DOM ══
const $ = id => document.getElementById(id);
const cvs  = $('game-cvs');
const ctx  = cvs.getContext('2d');

// ══ SCREENS ══
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  $(id).classList.add('on');
}

// ══ STORAGE ══
function loadPuzzles() {
  try { return JSON.parse(localStorage.getItem(SK_PUZZLES)) || []; } catch { return []; }
}
function savePuzzles(arr) {
  try { localStorage.setItem(SK_PUZZLES, JSON.stringify(arr)); } catch(e) {
    alert('保存容量が不足しています。古いパズルを削除してください。');
  }
}
// ランキングキー（回転モードで別管理）
function recKey() {
  return SK_REC + currentPuzzleId + '_' + currentDiff + (rotationMode ? 'r' : '');
}
function loadRecs(key) {
  try { return JSON.parse(localStorage.getItem(key)) || []; } catch { return []; }
}
function saveRecs(key, arr) {
  localStorage.setItem(key, JSON.stringify(arr));
}
function isNewRecord(ms) {
  const r = loadRecs(recKey());
  return r.length < MAX_REC || ms < r[r.length - 1].time;
}
function addRecord(name, ms) {
  const key = recKey();
  const r = loadRecs(key);
  r.push({ name: (name||'ゲスト').trim()||'ゲスト', time: ms });
  r.sort((a,b) => a.time - b.time);
  r.length = Math.min(r.length, MAX_REC);
  saveRecs(key, r);
  return r;
}

// ══ IMAGE UTILS ══
function compressImg(dataUrl, maxDim, q) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const sc = Math.min(maxDim / img.width, maxDim / img.height, 1);
      const w = Math.round(img.width * sc), h = Math.round(img.height * sc);
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      res(c.toDataURL('image/jpeg', q));
    };
    img.src = dataUrl;
  });
}
function loadImage(src) {
  return new Promise(res => { const i = new Image(); i.onload = () => res(i); i.src = src; });
}
function formatTime(ms) {
  const s = Math.floor(ms / 1000), m = Math.floor(s / 60);
  return `${m}:${String(s % 60).padStart(2,'0')}`;
}

// ══ PUZZLE LIST SCREEN ══
function showPuzzleList() {
  selectedListId = null;
  $('btn-plist-next').style.display = 'none';
  const grid = $('plist-grid');
  grid.innerHTML = '';
  const pzls = loadPuzzles();
  if (!pzls.length) {
    grid.innerHTML = '<div class="plist-empty">保存されたパズルがありません。<br>ホームから写真を選んでください。</div>';
  } else {
    pzls.forEach(p => {
      const el = document.createElement('div');
      el.className = 'plist-item';
      el.dataset.id = p.id;
      el.innerHTML = `<img src="${p.thumb}" alt="${p.name}">
        <button class="del-btn" data-id="${p.id}">✕</button>`;
      el.addEventListener('click', (e) => {
        if (e.target.classList.contains('del-btn')) {
          e.stopPropagation();
          deletePuzzle(p.id);
          return;
        }
        document.querySelectorAll('.plist-item').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
        selectedListId = p.id;
        $('btn-plist-next').style.display = 'block';
      });
      grid.appendChild(el);
    });
  }
  show('puzzle-list');
}
function deletePuzzle(id) {
  if (!confirm('このパズルを削除しますか？')) return;
  let pzls = loadPuzzles().filter(p => p.id !== id);
  savePuzzles(pzls);
  ['easy','normal','hard'].forEach(d => {
    localStorage.removeItem(SK_REC + id + '_' + d);
    localStorage.removeItem(SK_REC + id + '_' + d + 'r');
  });
  showPuzzleList();
}

// ══ DIFFICULTY SCREEN ══
async function showDifficulty(puzzleId) {
  currentPuzzleId = puzzleId;
  const pzls = loadPuzzles();
  const p = pzls.find(x => x.id === puzzleId);
  if (!p) { show('home'); return; }
  $('diff-img').src = p.thumb;
  show('difficulty');
}

// ══ GAME INIT ══
async function startGame(puzzleId, diff) {
  currentPuzzleId = puzzleId;
  currentDiff     = diff;
  const pzls = loadPuzzles();
  const pdata = pzls.find(x => x.id === puzzleId);
  if (!pdata) { show('home'); return; }

  show('game');
  $('pieces-disp').textContent = '';

  puzzleImg = await loadImage(pdata.image);

  cvs.width  = window.innerWidth;
  cvs.height = window.innerHeight - BAR_H;
  cvs.style.marginTop = BAR_H + 'px';

  const d = DIFF[diff];
  cols = d.cols; rows = d.rows;

  // ピース数が多いほどボードを広めに取る
  const boardRatio = cols >= 10 ? 0.68 : 0.58;
  const maxBW = cvs.width  * 0.96;
  const maxBH = cvs.height * boardRatio;
  const sc = Math.min(maxBW / puzzleImg.width, maxBH / puzzleImg.height);
  boardW = Math.round(puzzleImg.width  * sc);
  boardH = Math.round(puzzleImg.height * sc);
  boardX = Math.round((cvs.width - boardW) / 2);
  boardY = 4;
  pw = boardW / cols;
  ph = boardH / rows;

  hEdges = Array.from({length: rows-1}, () =>
    Array.from({length: cols}, () => Math.random() < .5 ? 1 : -1));
  vEdges = Array.from({length: rows}, () =>
    Array.from({length: cols-1}, () => Math.random() < .5 ? 1 : -1));

  pieces = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      pieces.push({
        col: c, row: r,
        x: 0, y: 0, rot: 0,
        placed: false, z: 0,
        tabs: {
          top:    r > 0      ? -hEdges[r-1][c] : 0,
          bottom: r < rows-1 ?  hEdges[r][c]   : 0,
          left:   c > 0      ? -vEdges[r][c-1] : 0,
          right:  c < cols-1 ?  vEdges[r][c]   : 0,
        }
      });
    }
  }

  scatterPieces();
  hintVisible = false;
  render();
  startTimer();
}

function scatterPieces() {
  maxZ = 0;
  const pad = Math.ceil(Math.max(pw, ph) * 0.35);
  const areaY = boardY + boardH + pad;
  const areaH = cvs.height - areaY - pad;
  const allW  = cvs.width - pw - pad * 2;
  for (let i = pieces.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [pieces[i], pieces[j]] = [pieces[j], pieces[i]];
  }
  pieces.forEach((p, i) => {
    p.placed = false;
    p.z = i;
    // 回転モード: ランダムな向き（0/90/180/270）
    p.rot = rotationMode ? [0,90,180,270][Math.floor(Math.random()*4)] : 0;
    if (areaH > ph + 10) {
      p.x = pad + Math.random() * allW;
      p.y = areaY + Math.random() * Math.max(0, areaH - ph);
    } else {
      p.x = pad + Math.random() * allW;
      p.y = pad + Math.random() * (cvs.height - ph - pad * 2);
    }
  });
  maxZ = pieces.length;
}

// ══ RENDER ══
function drawEdge(x1, y1, x2, y2, tab) {
  if (tab === 0) { ctx.lineTo(x2, y2); return; }
  const dx = x2-x1, dy = y2-y1;
  const len = Math.sqrt(dx*dx + dy*dy);
  const ux = dx/len, uy = dy/len;
  const nx = uy * tab, ny = -ux * tab;
  const th = len * 0.27;
  const tw = len * 0.20;
  const mx = (x1+x2)/2, my = (y1+y2)/2;
  ctx.lineTo(mx - ux*tw, my - uy*tw);
  ctx.bezierCurveTo(
    mx - ux*tw + nx*th*.6, my - uy*tw + ny*th*.6,
    mx - ux*tw*.3 + nx*th, my - uy*tw*.3 + ny*th,
    mx + nx*th,             my + ny*th
  );
  ctx.bezierCurveTo(
    mx + ux*tw*.3 + nx*th, my + uy*tw*.3 + ny*th,
    mx + ux*tw   + nx*th*.6, my + uy*tw + ny*th*.6,
    mx + ux*tw,             my + uy*tw
  );
  ctx.lineTo(x2, y2);
}

// ローカル座標（0,0)-(pw,ph) でピース形状を描画
function piecePathLocal(tabs) {
  ctx.beginPath();
  ctx.moveTo(0, 0);
  drawEdge(0,  0,  pw, 0,  tabs.top);
  drawEdge(pw, 0,  pw, ph, tabs.right);
  drawEdge(pw, ph, 0,  ph, tabs.bottom);
  drawEdge(0,  ph, 0,  0,  tabs.left);
  ctx.closePath();
}

// ピース中心を基準に回転変換を適用してから描画
function drawPiece(p) {
  const cx = p.x + pw/2, cy = p.y + ph/2;

  // ── 画像クリップ ──
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(p.rot * Math.PI / 180);
  ctx.translate(-pw/2, -ph/2);
  if (p === dragging) {
    ctx.shadowColor = 'rgba(80,30,140,.35)';
    ctx.shadowBlur  = 16;
    ctx.shadowOffsetX = 3; ctx.shadowOffsetY = 3;
  }
  piecePathLocal(p.tabs);
  ctx.clip();
  ctx.drawImage(puzzleImg, -p.col * pw, -p.row * ph, boardW, boardH);
  ctx.restore();

  // ── 枠線 ──
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(p.rot * Math.PI / 180);
  ctx.translate(-pw/2, -ph/2);
  piecePathLocal(p.tabs);
  ctx.strokeStyle = p === dragging ? '#7030c0' : 'rgba(80,30,140,.5)';
  ctx.lineWidth   = p === dragging ? 2.5 : 1.2;
  ctx.stroke();
  // 回転中ピースに回転インジケーター
  if (rotationMode && p === dragging && p.rot !== 0) {
    ctx.fillStyle = 'rgba(112,48,192,.75)';
    ctx.font = `bold ${Math.min(pw,ph)*.35}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('↻', pw/2, ph/2);
  }
  ctx.restore();
}

function render() {
  ctx.clearRect(0, 0, cvs.width, cvs.height);

  // Board ghost
  if (hintVisible) {
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.drawImage(puzzleImg, boardX, boardY, boardW, boardH);
    ctx.restore();
  }
  ctx.strokeStyle = 'rgba(112,48,192,.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(boardX, boardY, boardW, boardH);
  // inner grid
  ctx.strokeStyle = 'rgba(112,48,192,.15)';
  for (let c = 1; c < cols; c++) {
    ctx.beginPath();
    ctx.moveTo(boardX + c*pw, boardY);
    ctx.lineTo(boardX + c*pw, boardY + boardH);
    ctx.stroke();
  }
  for (let r = 1; r < rows; r++) {
    ctx.beginPath();
    ctx.moveTo(boardX,        boardY + r*ph);
    ctx.lineTo(boardX+boardW, boardY + r*ph);
    ctx.stroke();
  }

  // Placed pieces (bottom)
  const sorted = [...pieces].sort((a,b) => a.z - b.z);
  sorted.filter(p => p.placed).forEach(drawPiece);
  // Unplaced
  sorted.filter(p => !p.placed && p !== dragging).forEach(drawPiece);
  // Dragging on top
  if (dragging) drawPiece(dragging);

  // Piece count
  const done = pieces.filter(p => p.placed).length;
  $('pieces-disp').textContent = ` ${done}/${pieces.length}`;
}

// ══ SNAP ══
function trySnap(p) {
  const tx = boardX + p.col * pw;
  const ty = boardY + p.row * ph;
  const snapD = Math.max(pw * 0.40, 20);
  const posOk = Math.hypot(p.x - tx, p.y - ty) < snapD;
  const rotOk = !rotationMode || p.rot === 0;
  if (posOk && rotOk) {
    p.x = tx; p.y = ty; p.rot = 0; p.placed = true;
  }
}

function checkComplete() {
  if (pieces.every(p => p.placed)) {
    stopTimer();
    showComplete();
  }
}

// ══ TOUCH / MOUSE ══
function canvasXY(touch) {
  const rect = cvs.getBoundingClientRect();
  return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
}

// 回転変換を逆適用してローカル座標に変換してヒット判定
function findPiece(x, y) {
  const pad = Math.ceil(Math.max(pw, ph) * 0.32);
  const sorted = [...pieces].sort((a,b) => b.z - a.z);
  for (const p of sorted) {
    if (p.placed) continue;
    const cx = p.x + pw/2, cy = p.y + ph/2;
    const angle = -p.rot * Math.PI / 180;
    const dx = x - cx, dy = y - cy;
    const lx = dx * Math.cos(angle) - dy * Math.sin(angle) + pw/2;
    const ly = dx * Math.sin(angle) + dy * Math.cos(angle) + ph/2;
    if (lx >= -pad && lx <= pw+pad && ly >= -pad && ly <= ph+pad) return p;
  }
  return null;
}

function startDrag(x, y) {
  touchSX = x; touchSY = y; touchST = Date.now(); touchMoved = false;
  dragging = findPiece(x, y);
  if (dragging) {
    dragOX = x - dragging.x;
    dragOY = y - dragging.y;
    dragging.z = ++maxZ;
  }
}
function moveDrag(x, y) {
  if (!dragging) return;
  if (Math.hypot(x - touchSX, y - touchSY) > 10) touchMoved = true;
  dragging.x = x - dragOX;
  dragging.y = y - dragOY;
  render();
}
function endDrag() {
  if (!dragging) return;
  const elapsed = Date.now() - touchST;
  // 回転モード：ほぼ動かず短時間 → タップ = 90°回転
  if (rotationMode && !touchMoved && elapsed < 300) {
    dragging.rot = (dragging.rot + 90) % 360;
    dragging = null;
    render();
    return;
  }
  trySnap(dragging);
  dragging = null;
  render();
  checkComplete();
}

cvs.addEventListener('touchstart', e => {
  e.preventDefault();
  const {x, y} = canvasXY(e.touches[0]);
  startDrag(x, y);
}, {passive: false});
cvs.addEventListener('touchmove', e => {
  e.preventDefault();
  const {x, y} = canvasXY(e.touches[0]);
  moveDrag(x, y);
}, {passive: false});
cvs.addEventListener('touchend', e => { e.preventDefault(); endDrag(); }, {passive: false});

// マウス（デスクトップ確認用）
cvs.addEventListener('mousedown', e => {
  const r = cvs.getBoundingClientRect();
  startDrag(e.clientX - r.left, e.clientY - r.top);
});
cvs.addEventListener('mousemove', e => {
  const r = cvs.getBoundingClientRect();
  moveDrag(e.clientX - r.left, e.clientY - r.top);
});
cvs.addEventListener('mouseup', endDrag);
// 右クリックで回転（デスクトップ用）
cvs.addEventListener('contextmenu', e => {
  e.preventDefault();
  if (!rotationMode) return;
  const r = cvs.getBoundingClientRect();
  const p = findPiece(e.clientX - r.left, e.clientY - r.top);
  if (p) { p.rot = (p.rot + 90) % 360; render(); }
});

// ══ TIMER ══
function startTimer() {
  startTime = Date.now();
  clearInterval(timerIv);
  timerIv = setInterval(() => {
    elapsedMs = Date.now() - startTime;
    $('timer-disp').textContent = formatTime(elapsedMs);
  }, 500);
}
function stopTimer() {
  clearInterval(timerIv);
  elapsedMs = Date.now() - startTime;
  $('timer-disp').textContent = formatTime(elapsedMs);
}

// ══ COMPLETE SCREEN ══
function showComplete() {
  $('comp-time').textContent = formatTime(elapsedMs);
  const label = DIFF[currentDiff].label + (rotationMode ? ' (回転あり)' : '');
  $('rec-diff-label').textContent = `BEST ${MAX_REC} — ${label}`;

  const isNew = isNewRecord(elapsedMs);
  if (isNew) {
    showNameModal();
  } else {
    renderRecords(null);
    show('complete');
  }
}

function renderRecords(newTime) {
  const recs = loadRecs(recKey());
  const el = $('records-list');
  el.innerHTML = '';
  if (!recs.length) {
    el.innerHTML = '<div class="rec-empty">記録なし</div>'; return;
  }
  recs.forEach((r, i) => {
    const isNew = newTime !== null && r.time === newTime;
    const cl = i===0?'g1':i===1?'g2':'g3';
    el.innerHTML += `<div class="record-row${isNew?' new-rec':''}">
      <span class="rec-rank ${cl}">${i+1}.</span>
      <span class="rec-name">${r.name}</span>
      <span class="rec-time">${formatTime(r.time)}</span>
    </div>`;
  });
}

// ══ NAME MODAL ══
function showNameModal() {
  $('nm-time-disp').textContent = formatTime(elapsedMs) + ' を記録！';
  $('nm-input').value = '';
  $('name-modal').classList.add('on');
  setTimeout(() => $('nm-input').focus(), 100);
}
function closeNameModal(name) {
  $('name-modal').classList.remove('on');
  if (name !== null) addRecord(name, elapsedMs);
  renderRecords(name !== null ? elapsedMs : null);
  show('complete');
}

$('btn-nm-save').addEventListener('click', () => {
  closeNameModal($('nm-input').value);
});
$('nm-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') closeNameModal($('nm-input').value);
});
$('btn-nm-skip').addEventListener('click', () => closeNameModal(null));

// ══ HINT ══
$('btn-hint').addEventListener('click', () => {
  hintVisible = !hintVisible;
  $('btn-hint').textContent = hintVisible ? 'ヒント ON' : 'ヒント';
  render();
});

// ══ PHOTO SAVE ══
async function saveNewPuzzle(dataUrl) {
  const [thumb, image] = await Promise.all([
    compressImg(dataUrl, MAX_THUMB, .8),
    compressImg(dataUrl, MAX_IMG_DIM, .85),
  ]);
  const pzls = loadPuzzles();
  const id   = 'p' + Date.now();
  const name = '写真' + (pzls.length + 1);
  pzls.push({ id, name, thumb, image, created: Date.now() });
  savePuzzles(pzls);
  return id;
}

// ══ BUTTON EVENTS ══
$('btn-new').addEventListener('click', () => $('file-input').click());
$('file-input').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  $('file-input').value = '';
  const reader = new FileReader();
  reader.onload = async ev => {
    const id = await saveNewPuzzle(ev.target.result);
    showDifficulty(id);
  };
  reader.readAsDataURL(file);
});

$('btn-saved').addEventListener('click', showPuzzleList);
$('btn-plist-back').addEventListener('click', () => show('home'));
$('btn-plist-next').addEventListener('click', () => {
  if (selectedListId) showDifficulty(selectedListId);
});

// 回転トグル
$('rot-off').addEventListener('click', () => {
  rotationMode = false;
  $('rot-off').classList.add('active');
  $('rot-on').classList.remove('active');
  $('rot-hint').style.display = 'none';
});
$('rot-on').addEventListener('click', () => {
  rotationMode = true;
  $('rot-on').classList.add('active');
  $('rot-off').classList.remove('active');
  $('rot-hint').style.display = 'block';
});

// 難易度カード
document.querySelectorAll('.diff-card').forEach(el => {
  el.addEventListener('click', () => startGame(currentPuzzleId, el.dataset.diff));
});
$('btn-diff-back').addEventListener('click', () => {
  if (loadPuzzles().length > 0) showPuzzleList(); else show('home');
});

$('btn-game-quit').addEventListener('click', () => { stopTimer(); showPuzzleList(); });
$('btn-comp-home').addEventListener('click', () => show('home'));
$('btn-comp-replay').addEventListener('click', () => startGame(currentPuzzleId, currentDiff));
</script>
</body>
</html>
