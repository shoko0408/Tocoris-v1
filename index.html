<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>しょこのゲームランド</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      color: #fff;
      font-size: 2rem;
      margin-bottom: 8px;
      text-align: center;
      letter-spacing: 2px;
    }

    .subtitle {
      color: #a0aec0;
      font-size: 0.9rem;
      margin-bottom: 40px;
    }

    .game-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 400px;
    }

    .game-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 24px 20px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all 0.2s ease;
      backdrop-filter: blur(10px);
    }

    .game-card:active {
      transform: scale(0.97);
      background: rgba(255,255,255,0.15);
    }

    .game-icon {
      font-size: 2.5rem;
      width: 56px;
      text-align: center;
      flex-shrink: 0;
    }

    .game-info {
      flex: 1;
    }

    .game-title {
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .game-desc {
      color: #a0aec0;
      font-size: 0.8rem;
    }

    .arrow {
      color: #a0aec0;
      font-size: 1.2rem;
    }

    .footer {
      margin-top: 40px;
      color: #4a5568;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>

  <h1>🎮 ゲームランド</h1>
  <p class="subtitle">遊びたいゲームを選んでね</p>

  <div class="game-grid">

    <a class="game-card" href="Tocoris_v1.0.html">
      <div class="game-icon">🐿️</div>
      <div class="game-info">
        <div class="game-title">とこりす v1.0</div>
        <div class="game-desc">とこりすのゲーム</div>
      </div>
      <div class="arrow">›</div>
    </a>

    <a class="game-card" href="TocoPuzzle_v1.0.html">
      <div class="game-icon">🧩</div>
      <div class="game-info">
        <div class="game-title">ジグソーパズル v1.0</div>
        <div class="game-desc">パズルゲーム</div>
      </div>
      <div class="arrow">›</div>
    </a>

  </div>

  <p class="footer">© shoko0408</p>

</body>
</html>
